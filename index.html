<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>💎 Pink Earring – AR Experience</title>

  <!-- Google Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;700&display=swap');

    :root {
      --rose:    #f4a7c0;
      --deep:    #c2185b;
      --gold:    #f9d77e;
      --bg:      #1a0a10;
      --glass:   rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Tajawal', sans-serif;
      overflow: hidden;
    }

    /* ── ambient background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(194,24,91,.25) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(244,167,192,.15) 0%, transparent 70%);
      animation: pulse 6s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { opacity: .7; } to { opacity: 1; }
    }

    /* ── model viewer ── */
    model-viewer {
      position: fixed; inset: 0; z-index: 1;
      width: 100vw; height: 100vh;
      background: transparent;
      --poster-color: transparent;
    }

    /* ── top badge ── */
    .badge {
      position: fixed; top: env(safe-area-inset-top, 18px); left: 50%; transform: translateX(-50%);
      z-index: 10;
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(244,167,192,.3);
      border-radius: 999px;
      padding: 8px 20px;
      color: var(--rose);
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      animation: fadeDown .8s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateX(-50%) translateY(-12px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    /* ── bottom CTA ── */
    .cta-wrap {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 36px);
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: fadeUp 1s .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateX(-50%) translateY(18px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    .cta-btn {
      /* slot="ar-button" must be on the element placed inside model-viewer */
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--deep) 0%, #e91e8c 100%);
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      border: none; border-radius: 999px;
      padding: 16px 34px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(194,24,91,.5), 0 0 0 1px rgba(255,255,255,.12) inset;
      transition: transform .18s ease, box-shadow .18s ease;
      white-space: nowrap;
      text-decoration: none;
    }
    .cta-btn:active {
      transform: scale(.96);
      box-shadow: 0 4px 16px rgba(194,24,91,.4);
    }
    .cta-btn .gem { font-size: 1.25rem; animation: spin 3s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint {
      color: rgba(255,255,255,.45);
      font-size: .75rem;
      letter-spacing: .06em;
    }

    /* ── loading overlay ── */
    .loader {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      background: var(--bg);
      transition: opacity .6s ease, visibility .6s ease;
    }
    .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-ring {
      width: 64px; height: 64px;
      border: 3px solid rgba(244,167,192,.2);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    .loader-text {
      color: rgba(255,255,255,.55);
      font-size: .85rem;
      letter-spacing: .1em;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <span class="loader-text">جاري تحميل الموديل…</span>
  </div>

  <!-- Top badge -->
  <div class="badge">✦ تجربة واقع معزز</div>

  <!-- Model Viewer -->
  <model-viewer
    id="mv"
    src="pink_earring.glb"
    alt="حلق وردي ثلاثي الأبعاد"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    auto-rotate-delay="500"
    rotation-per-second="30deg"
    shadow-intensity="1.2"
    exposure="1.1"
    environment-image="neutral"
    touch-action="pan-y"
    style="width:100vw;height:100vh;"
  >
    <!-- AR button lives INSIDE model-viewer via slot -->
    <button slot="ar-button" class="cta-btn" id="ar-btn">
      <span class="gem">💎</span>
      جربه في غرفتك الآن
    </button>
  </model-viewer>

  <!-- Bottom wrapper (visible when AR button isn't shown by device natively) -->
  <div class="cta-wrap" id="cta-wrap">
    <button class="cta-btn" onclick="document.getElementById('mv').activateAR()">
      <span class="gem">💎</span>
      جربه في غرفتك الآن
    </button>
    <span class="hint">↑ اسحب لتدوير الموديل</span>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const loader = document.getElementById('loader');

    mv.addEventListener('load', () => {
      loader.classList.add('hidden');
    });

    // Hide fallback CTA if AR button slot is being used by model-viewer
    mv.addEventListener('ar-status', (e) => {
      if (e.detail.status === 'session-started') {
        document.getElementById('cta-wrap').style.display = 'none';
      }
    });

    // Timeout fallback
    setTimeout(() => loader.classList.add('hidden'), 5000);
  </script>
</body>
</html>
